name: NexaCloud CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Test Backend ─────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: node -e "require('./src/server.js')" &
        env:
          NODE_ENV: test
          PORT: 5000

  # ─── Build Frontend ───────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm run build
        env:
          VITE_API_URL: /api
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ─── Test Python ──────────────────────────────────────
  test-python:
    name: Test Python Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py && echo "Python syntax OK"

  # ─── Docker Build ─────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file:    ./docker/Dockerfile.backend
          push:    false
          tags:    nexacloud-backend:ci
      - name: Build Python
        uses: docker/build-push-action@v5
        with:
          context: ./python-service
          file:    ./docker/Dockerfile.python
          push:    false
          tags:    nexacloud-python:ci
